name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Vars de runtime exigidas para validar que a app sobe na build do
        # Next; valores fake só atravessam o build (não conectam em nada).
        env:
          ADMIN_PASSWORD: ci-fake-password
          ADMIN_SECRET: ci-fake-secret-precisa-de-32-chars-no-minimo-aqui
          UNIFI_URL: https://example.invalid
          UNIFI_USERNAME: ci
          UNIFI_PASSWORD: ci
          DATABASE_URL: file:./prisma/dev.db
        run: npm run build
